openapi: 3.1.0
info:
  title: Task Management API
  description: |
    RESTful API for a simple task management system built as part of a .NET technical interview exercise.

    **Implementation notes:**
    - Auth endpoints are mounted under `/api/Auth` (PascalCase from controller name). Most HTTP clients treat routes as case-insensitive.
    - Error responses currently use ASP.NET `ProblemDetails` shape.

    ## Features
    - User registration and JWT-based authentication
    - Full CRUD operations on tasks (title, description, status, due_date)
    - Tasks are scoped to the authenticated user
    - Clean Architecture implementation using LiteDB (no Entity Framework or Dapper)

    ## Authentication
    All task endpoints require a valid JWT Bearer token obtained from the login endpoint.

    ## User Story (Informal)
    As a busy professional, I want to manage my personal tasks (create, view, update status, delete) 
    so that I can stay organized and meet my deadlines. I need to securely register and log in 
    so that only I can see and modify my own tasks.
  version: 1.0.0
  contact:
    name: Ballast Lane Technical Interview
  license:
    name: Private

servers:
  - url: https://localhost:7171
    description: Local development (HTTPS)
  - url: http://localhost:5171
    description: Local development (HTTP)

tags:
  - name: Authentication
    description: User registration and login operations
  - name: Tasks
    description: Task CRUD operations (requires authentication)

components:
  securitySchemes:
    BearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
      description: JWT Authorization header using the Bearer scheme. Example: "Bearer {token}"

  schemas:
    TaskStatus:
      type: string
      enum:
        - Todo
        - InProgress
        - Done
      description: Current status of the task

    Task:
      type: object
      required:
        - id
        - title
        - description
        - status
        - createdAt
        - updatedAt
      properties:
        id:
          type: string
          format: uuid
          example: "123e4567-e89b-12d3-a456-426614174000"
        title:
          type: string
          minLength: 1
          maxLength: 200
          example: "Prepare for Ballast Lane interview"
        description:
          type: string
          maxLength: 2000
          example: "Complete the .NET technical exercise following Clean Architecture"
        status:
          $ref: '#/components/schemas/TaskStatus'
        dueDate:
          type: string
          format: date-time
          nullable: true
          example: "2026-05-15T23:59:59Z"
        createdAt:
          type: string
          format: date-time
          example: "2026-04-20T10:30:00Z"
        updatedAt:
          type: string
          format: date-time
          example: "2026-04-21T14:15:00Z"

    CreateTaskRequest:
      type: object
      required:
        - title
        - description
      properties:
        title:
          type: string
          minLength: 1
          maxLength: 200
          example: "Review Clean Architecture principles"
        description:
          type: string
          maxLength: 2000
          example: "Ensure proper separation of concerns across all layers"
        dueDate:
          type: string
          format: date-time
          nullable: true
          example: "2026-04-25T18:00:00Z"

    UpdateTaskRequest:
      type: object
      properties:
        title:
          type: string
          minLength: 1
          maxLength: 200
        description:
          type: string
          maxLength: 2000
        status:
          $ref: '#/components/schemas/TaskStatus'
        dueDate:
          type: string
          format: date-time
          nullable: true
      description: All fields are optional. Only provided fields will be updated.

    AuthResponse:
      type: object
      required:
        - token
        - email
        - fullName
      properties:
        token:
          type: string
          description: JWT token to use in Authorization header
          example: "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9..."
        email:
          type: string
          format: email
          example: "demo@taskmanagement.com"
        fullName:
          type: string
          example: "Demo User"

    RegisterRequest:
      type: object
      required:
        - email
        - password
        - fullName
      properties:
        email:
          type: string
          format: email
          example: "newuser@example.com"
        password:
          type: string
          format: password
          minLength: 6
          example: "SecurePass123!"
        fullName:
          type: string
          minLength: 1
          example: "Jane Doe"

    LoginRequest:
      type: object
      required:
        - email
        - password
      properties:
        email:
          type: string
          format: email
          example: "demo@taskmanagement.com"
        password:
          type: string
          format: password
          example: "Demo123!"

    ErrorResponse:
      type: object
      description: |
        Note: The current implementation returns ASP.NET Core ProblemDetails objects
        (with "title", "status", "type" etc.) rather than this exact shape for most errors.
        This schema is aspirational / for documentation purposes.
      properties:
        error:
          type: string
          description: Human-readable error message
        traceId:
          type: string
          description: Optional correlation ID for debugging

  responses:
    UnauthorizedError:
      description: Authentication required or token invalid/expired
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
          examples:
            unauthorized:
              summary: Missing or invalid token
              value:
                error: "Invalid or expired token"

    NotFoundError:
      description: Resource not found
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
          examples:
            taskNotFound:
              summary: Task does not exist or does not belong to user
              value:
                error: "Task not found"

    ValidationError:
      description: Invalid request data
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
          examples:
            validationFailed:
              summary: Validation error example
              value:
                error: "Title is required"

    BadRequestError:
      description: Bad request or business rule violation
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'

security:
  - BearerAuth: []

paths:
  /api/auth/register:
    post:
      tags:
        - Authentication
      summary: Register a new user
      description: Creates a new user account and returns a JWT token for immediate login.
      operationId: registerUser
      security: []   # Public endpoint
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RegisterRequest'
      responses:
        '200':
          description: User registered successfully. Returns auth token.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthResponse'
        '400':
          $ref: '#/components/responses/ValidationError'

  /api/auth/login:
    post:
      tags:
        - Authentication
      summary: Login and obtain JWT token
      description: Authenticates user credentials and returns a JWT Bearer token.
      operationId: loginUser
      security: []   # Public endpoint
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LoginRequest'
      responses:
        '200':
          description: Login successful
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthResponse'
        '401':
          description: Invalid credentials
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              examples:
                invalidCredentials:
                  value:
                    error: "Invalid email or password"

  /api/tasks:
    get:
      tags:
        - Tasks
      summary: Get all tasks for the current user
      operationId: getMyTasks
      responses:
        '200':
          description: List of the authenticated user's tasks
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Task'
        '401':
          $ref: '#/components/responses/UnauthorizedError'

    post:
      tags:
        - Tasks
      summary: Create a new task
      operationId: createTask
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateTaskRequest'
      responses:
        '201':
          description: Task created successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Task'
          headers:
            Location:
              description: URL of the newly created task
              schema:
                type: string
        '400':
          $ref: '#/components/responses/ValidationError'
        '401':
          $ref: '#/components/responses/UnauthorizedError'

  /api/tasks/{id}:
    parameters:
      - name: id
        in: path
        required: true
        schema:
          type: string
          format: uuid
        description: The unique identifier of the task

    get:
      tags:
        - Tasks
      summary: Get a single task by ID
      operationId: getTaskById
      responses:
        '200':
          description: The requested task
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Task'
        '401':
          $ref: '#/components/responses/UnauthorizedError'
        '404':
          $ref: '#/components/responses/NotFoundError'

    put:
      tags:
        - Tasks
      summary: Update an existing task (partial update supported)
      operationId: updateTask
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateTaskRequest'
      responses:
        '200':
          description: Updated task
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Task'
        '400':
          $ref: '#/components/responses/BadRequestError'
        '401':
          $ref: '#/components/responses/UnauthorizedError'
        '404':
          $ref: '#/components/responses/NotFoundError'

    delete:
      tags:
        - Tasks
      summary: Delete a task
      operationId: deleteTask
      responses:
        '204':
          description: Task deleted successfully (no content)
        '401':
          $ref: '#/components/responses/UnauthorizedError'
        '404':
          $ref: '#/components/responses/NotFoundError'
        '400':
          $ref: '#/components/responses/BadRequestError'
