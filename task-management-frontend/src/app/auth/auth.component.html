<div class="min-h-screen bg-gray-50 flex items-center justify-center px-4">
  <div class="max-w-md w-full">
    <!-- Header -->
    <div class="text-center mb-8">
      <div class="w-12 h-12 bg-indigo-600 rounded-xl flex items-center justify-center mx-auto mb-4">
        <span class="text-white font-bold text-2xl">TM</span>
      </div>
      <h1 class="text-3xl font-semibold text-gray-900">Task Management</h1>
      <p class="text-gray-600 mt-2">Sign in to manage your tasks</p>
    </div>

    <!-- Card -->
    <div class="bg-white rounded-2xl shadow-lg border border-gray-200 p-8">
      <!-- Toggle -->
      <div class="flex rounded-lg bg-gray-100 p-1 mb-6">
        <button
          (click)="toggleMode()"
          class="flex-1 py-2 text-sm font-medium rounded-md transition-all"
          [class.bg-white]="isLoginMode()"
          [class.shadow]="isLoginMode()"
          [class.text-gray-900]="isLoginMode()"
          [class.text-gray-600]="!isLoginMode()">
          Sign In
        </button>
        <button
          (click)="toggleMode()"
          class="flex-1 py-2 text-sm font-medium rounded-md transition-all"
          [class.bg-white]="!isLoginMode()"
          [class.shadow]="!isLoginMode()"
          [class.text-gray-900]="!isLoginMode()"
          [class.text-gray-600]="isLoginMode()">
          Create Account
        </button>
      </div>

      <!-- Error -->
      @if (error()) {
        <div class="mb-4 p-3 bg-red-50 border border-red-200 rounded-lg text-red-700 text-sm">
          {{ error() }}
        </div>
      }

      <!-- Login Form -->
      @if (isLoginMode()) {
        <form (ngSubmit)="onSubmit()" #loginFormRef="ngForm">
          <div class="space-y-4">
            <div>
              <label class="block text-sm font-medium text-gray-700 mb-1">Email</label>
              <input
                type="email"
                [(ngModel)]="loginForm.email"
                name="email"
                required
                class="w-full px-4 py-2.5 border border-gray-300 rounded-lg focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500 outline-none transition"
                placeholder="you@example.com">
            </div>

            <div>
              <label class="block text-sm font-medium text-gray-700 mb-1">Password</label>
              <input
                type="password"
                [(ngModel)]="loginForm.password"
                name="password"
                required
                class="w-full px-4 py-2.5 border border-gray-300 rounded-lg focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500 outline-none transition"
                placeholder="••••••••">
            </div>
          </div>

          <button
            type="submit"
            [disabled]="loading() || !loginFormRef.form.valid"
            class="mt-6 w-full py-3 bg-indigo-600 hover:bg-indigo-700 text-white font-medium rounded-lg transition disabled:opacity-60 flex items-center justify-center gap-2">
            @if (loading()) {
              <span class="animate-spin">⏳</span> Signing in...
            } @else {
              Sign In
            }
          </button>
        </form>
      }

      <!-- Register Form -->
      @if (!isLoginMode()) {
        <form (ngSubmit)="onSubmit()" #registerFormRef="ngForm">
          <div class="space-y-4">
            <div>
              <label class="block text-sm font-medium text-gray-700 mb-1">Full Name</label>
              <input
                type="text"
                [(ngModel)]="registerForm.fullName"
                name="fullName"
                required
                class="w-full px-4 py-2.5 border border-gray-300 rounded-lg focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500 outline-none transition"
                placeholder="Jane Doe">
            </div>

            <div>
              <label class="block text-sm font-medium text-gray-700 mb-1">Email</label>
              <input
                type="email"
                [(ngModel)]="registerForm.email"
                name="email"
                required
                class="w-full px-4 py-2.5 border border-gray-300 rounded-lg focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500 outline-none transition"
                placeholder="you@example.com">
            </div>

            <div>
              <label class="block text-sm font-medium text-gray-700 mb-1">Password</label>
              <input
                type="password"
                [(ngModel)]="registerForm.password"
                name="password"
                required minlength="6"
                class="w-full px-4 py-2.5 border border-gray-300 rounded-lg focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500 outline-none transition"
                placeholder="At least 6 characters">
            </div>
          </div>

          <button
            type="submit"
            [disabled]="loading() || !registerFormRef.form.valid"
            class="mt-6 w-full py-3 bg-indigo-600 hover:bg-indigo-700 text-white font-medium rounded-lg transition disabled:opacity-60 flex items-center justify-center gap-2">
            @if (loading()) {
              <span class="animate-spin">⏳</span> Creating account...
            } @else {
              Create Account
            }
          </button>
        </form>
      }
    </div>

    <p class="text-center text-xs text-gray-500 mt-6">
      Demo credentials: demo@taskmanagement.com / Demo123!
    </p>
  </div>
</div>
